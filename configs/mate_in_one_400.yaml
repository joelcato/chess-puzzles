# Mate in One — 400 puzzles, balanced by piece type, ordered easy → hard.
#
# Structure: 4 invisible chapters of 100 puzzles each:
#   1. White to move, easy  (rating < 1600)
#   2. White to move, hard  (rating >= 1600)
#   3. Black to move, easy  (rating < 1600)
#   4. Black to move, hard  (rating >= 1600)
#
# Within each 100-puzzle section, pieces are distributed as:
#   Easy:  Queen : 20   Rook : 20   Bishop : 20   Knight : 20   Pawn : 12   King : 8
#   Hard:  Queen : 26   Rook : 20   Bishop : 20   Knight : 20   Pawn : 12   King : 2
#
# Chapter title pages and TOC are disabled so the reader sees one
# seamless flow of 400 puzzles, gently ramping from accessible to tricky.
# Within each section, puzzles are sorted by nb_plays desc, which naturally
# interleaves piece types.
#
# King sets have no plays/popularity filter — there are only ~32 white and
# ~27 black king-move mates in the entire DB, so we take whatever we can get.

book:
  title: "400 Mates-in-One"
  subtitle: ""
  author: "by Joel Cato"
  publisher: "Covington Press"
  toc: false
  chapter_title_pages: false
  output_json: "data/mate_in_one_400.json"

filters:
  min_plays: 500
  min_popularity: 50

chapters:
  # ── Chapter 1: White to move, easy (rating < 1600) ──────────────────────
  - title: "White to Move"
    sort:
      - field: nb_plays
        order: desc
    sets:
      - themes: [mateIn1]
        side_to_move: white
        first_move_piece: Q
        rating: [0, 1599]
        count: 20
        sort:
          - field: nb_plays
            order: desc

      - themes: [mateIn1]
        side_to_move: white
        first_move_piece: R
        rating: [0, 1599]
        count: 20
        sort:
          - field: nb_plays
            order: desc

      - themes: [mateIn1]
        side_to_move: white
        first_move_piece: B
        rating: [0, 1599]
        count: 20
        sort:
          - field: nb_plays
            order: desc

      - themes: [mateIn1]
        side_to_move: white
        first_move_piece: N
        rating: [0, 1599]
        count: 20
        sort:
          - field: nb_plays
            order: desc

      - themes: [mateIn1]
        side_to_move: white
        first_move_piece: P
        rating: [0, 1599]
        count: 12
        sort:
          - field: nb_plays
            order: desc

      # Easy K mates: cap at 1599 so the 2 above-1600 mates (uWQ7V, oDsjp) stay
      # in the hard chapter.
      - themes: [mateIn1]
        side_to_move: white
        first_move_piece: K
        rating: [0, 1599]
        count: 8
        min_plays: 0
        min_popularity: 0
        sort:
          - field: nb_plays
            order: desc

  # ── Chapter 2: White to move, hard (rating >= 1600) ─────────────────────
  - title: "White to Move"
    sort:
      - field: nb_plays
        order: desc
    sets:
      - themes: [mateIn1]
        side_to_move: white
        first_move_piece: Q
        rating: [1600, 9999]
        count: 26
        sort:
          - field: nb_plays
            order: desc

      - themes: [mateIn1]
        side_to_move: white
        first_move_piece: R
        rating: [1600, 9999]
        count: 20
        sort:
          - field: nb_plays
            order: desc

      - themes: [mateIn1]
        side_to_move: white
        first_move_piece: B
        rating: [1600, 9999]
        count: 20
        sort:
          - field: nb_plays
            order: desc

      - themes: [mateIn1]
        side_to_move: white
        first_move_piece: N
        rating: [1600, 9999]
        count: 20
        sort:
          - field: nb_plays
            order: desc

      - themes: [mateIn1]
        side_to_move: white
        first_move_piece: P
        rating: [1600, 9999]
        count: 12
        sort:
          - field: nb_plays
            order: desc

      # rating: [1600, 9999] — only ~2 white King mates exist above 1600,
      # so this set will yield exactly 2.
      - themes: [mateIn1]
        side_to_move: white
        first_move_piece: K
        rating: [1600, 9999]
        count: 2
        min_plays: 0
        min_popularity: 0
        sort:
          - field: nb_plays
            order: desc

  # ── Chapter 3: Black to move, easy (rating < 1600) ──────────────────────
  - title: "Black to Move"
