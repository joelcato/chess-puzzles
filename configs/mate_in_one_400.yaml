          - field: nb_plays
            order: desc

      - themes: [mateIn1]
        side_to_move: black
        first_move_piece: B
        rating: [1600, 9999]
        count: 20
        sort:
          - field: nb_plays
            order: desc

      - themes: [mateIn1]
        side_to_move: black
        first_move_piece: N
        rating: [1600, 9999]
        count: 20
        sort:
          - field: nb_plays
            order: desc

      - themes: [mateIn1]
        side_to_move: black
        first_move_piece: P
        rating: [1600, 9999]
        count: 12
        sort:
          - field: nb_plays
            order: desc

      # rating: [1600, 9999] — only ~2 black King mates exist above 1600.
      - themes: [mateIn1]
        side_to_move: black
