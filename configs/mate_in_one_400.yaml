      - themes: [mateIn1]
        side_to_move: black
        first_move_piece: R
        rating: [0, 1599]
        count: 20
        sort:
          - field: nb_plays
            order: desc

      - themes: [mateIn1]
        side_to_move: black
        first_move_piece: B
        rating: [0, 1599]
        count: 20
        sort:
          - field: nb_plays
            order: desc

      - themes: [mateIn1]
        side_to_move: black
        first_move_piece: N
        rating: [0, 1599]
        count: 20
