# Mating Patterns — 19 chapters, ~104 puzzles each (52 white, 52 black)
# Each chapter covers one mating pattern theme.
# Within each chapter, puzzles are grouped by side-to-move, then sorted
# rating ascending within each rating band.
#
# Set-level filter logic:
#   themes: ALL listed themes must appear on the puzzle (AND logic)
#   side_to_move: 'white' or 'black'
#   rating: [min, max] inclusive
#   count: exact number of puzzles to select from this filter+sort combination
#   sort: ordered list of sort fields applied when selecting from candidates
#
# Chapter-level sort is applied after all sets are assembled, overriding
# the within-set order. Omit chapter-level sort to preserve set order.

book:
  title: "Chess Puzzle Book"
  subtitle: "Mating Patterns"
  author: "by Joel Cato"
  publisher: "Covington Press"
  toc: true
  chapter_title_pages: true
  output_json: "data/mating_patterns_100_by_theme.json"

# Global filters applied to every set unless overridden at set level
filters:
  min_plays: 50
  min_popularity: 0

# Chapter-level sort: applied after all sets in a chapter are assembled.
# This produces the final puzzle order within each chapter.
default_chapter_sort:
  - field: side_to_move   # 'w' before 'b' (white first)
    order: asc
  - field: mate_in
    order: asc
  - field: rating
    order: asc

