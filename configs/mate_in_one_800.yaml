      - {themes: [mateIn1], side_to_move: white, first_move_piece: N, rating: [1200, 1599], count: 20, sort: [{field: nb_plays, order: desc}]}
      - {themes: [mateIn1], side_to_move: white, first_move_piece: P, rating: [1200, 1599], count: 12, sort: [{field: nb_plays, order: desc}]}
      - {themes: [mateIn1], side_to_move: white, first_move_piece: K, rating: [1200, 1599], count: 8,  sort: [{field: nb_plays, order: desc}], min_plays: 0, min_popularity: 0}

