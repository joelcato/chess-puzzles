# Mate in One — 800 puzzles across 8 invisible chapters (4 rating bands × 2 sides).
#
# Structure: 8 chapters, each sorted by nb_plays desc only.
#   Chapter order: White Band 1, White Band 2, White Band 3, White Band 4,
#                  Black Band 1, Black Band 2, Black Band 3, Black Band 4.
#   chapter_title_pages: false — chapters are invisible to the reader; the book
#   flows seamlessly from easy to hard, white then black.
#
# Piece distribution per 100-puzzle chapter:
#   Bands 1–2 (easy/medium):  Q:20  R:20  B:20  N:20  P:12  K:8
#   Band 3 (1600–1999):       Q:26  R:20  B:20  N:20  P:12  K:2
#   Band 4 (2000+):           Q:27  R:21  B:20  N:20  P:12       (no K mates exist)
#
# King sets have no plays/popularity filters — there are only ~16/14 white
# and ~13/12 black king-move mates per band in the DB.

book:
  title: "800 Mates-in-One"
  subtitle: ""
  author: "by Joel Cato"
  publisher: "Covington Press"
  toc: false
  chapter_title_pages: false
  output_json: "data/mate_in_one_800.json"

filters:
  min_plays: 500
  min_popularity: 50

chapters:

  # ════════════════════════════════════════════════════════════════════════════
  # White to Move
  # ════════════════════════════════════════════════════════════════════════════

  # ── Chapter 1: White, Band 1 (0–1199) ────────────────────────────────────
  - title: "White to Move"
    sort: [{field: nb_plays, order: desc}]
    sets:
      - {themes: [mateIn1], side_to_move: white, first_move_piece: Q, rating: [0, 1199], count: 20, sort: [{field: nb_plays, order: desc}]}
      - {themes: [mateIn1], side_to_move: white, first_move_piece: R, rating: [0, 1199], count: 20, sort: [{field: nb_plays, order: desc}]}
      - {themes: [mateIn1], side_to_move: white, first_move_piece: B, rating: [0, 1199], count: 20, sort: [{field: nb_plays, order: desc}]}
      - {themes: [mateIn1], side_to_move: white, first_move_piece: N, rating: [0, 1199], count: 20, sort: [{field: nb_plays, order: desc}]}
      - {themes: [mateIn1], side_to_move: white, first_move_piece: P, rating: [0, 1199], count: 12, sort: [{field: nb_plays, order: desc}]}
      - {themes: [mateIn1], side_to_move: white, first_move_piece: K, rating: [0, 1199], count: 8,  sort: [{field: nb_plays, order: desc}], min_plays: 0, min_popularity: 0}

  # ── Chapter 2: White, Band 2 (1200–1599) ─────────────────────────────────
  - title: "White to Move"
    sort: [{field: nb_plays, order: desc}]
    sets:
      - {themes: [mateIn1], side_to_move: white, first_move_piece: Q, rating: [1200, 1599], count: 20, sort: [{field: nb_plays, order: desc}]}
